---
# Shared credentials. The k8s README recommends changing these in production;
# for a single-node test cluster this is fine.
apiVersion: v1
kind: Secret
metadata:
  name: safeline-pg-secret
  namespace: safeline-ce
type: Opaque
stringData:
  password: "tier3-pg-test-password-99"
---
apiVersion: v1
kind: Secret
metadata:
  name: safeline-mgt-secret
  namespace: safeline-ce
type: Opaque
stringData:
  POSTGRES_PASSWORD: "tier3-pg-test-password-99"
---
# Detector config — must be on TCP/8000, not unix socket, in k8s.
# The detector binary reads /resources/detector/detector.yml. The
# detector's entrypoint loads snserver.yml first and then OVERLAYS the
# keys in detector.yml on top (see load_custom_conf in the entrypoint).
# That means only the keys we want to override need to live here.
# Reference: chaitin/safeline-detector image `/detector/snserver.yml`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: safeline-detector-config
  namespace: safeline-ce
data:
  detector.yml: |
    bind_addr: 0.0.0.0
    listen_port: 8000
    mgt_server_addr: https://safeline-mgt:1443
    web_log: http://safeline-luigi:80/api/log/envelop
    log_level: info
---
# FVM startup script placeholder (fvm has no config in compose; the binary
# serves :9002 over TCP by default).
apiVersion: v1
kind: ConfigMap
metadata:
  name: safeline-fvm-config
  namespace: safeline-ce
data:
  fvm.yml: |
    bind_addr: 0.0.0.0
    listen_port: 9002
