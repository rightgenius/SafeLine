---
# SafeLine mgt-api. mgt-api is a Gin server that:
#  - serves HTTPS on :1443 (api/open/* + console UI)
#  - serves gRPC on :9002 (only tcd talks to this; not exposed externally)
# The k8s README env list (MGT_PG) is the same as compose. mgt also
# needs fvm reachable at safeline-fvm:9004 for bytecode updates, so we
# add a wait-for-fvm init container.
apiVersion: v1
kind: Service
metadata:
  name: safeline-mgt
  namespace: safeline-ce
spec:
  selector:
    app: safeline-mgt
  ports:
    - name: api
      port: 1443
      targetPort: 1443
    - name: grpc
      port: 9002
      targetPort: 9004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safeline-mgt
  namespace: safeline-ce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safeline-mgt
  template:
    metadata:
      labels:
        app: safeline-mgt
    spec:
      initContainers:
        - name: wait-for-pg
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z safeline-pg 5432; do sleep 2; done"
        - name: wait-for-fvm
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z safeline-fvm 9004; do sleep 2; done"
      containers:
        - name: mgt
          image: chaitin/safeline-mgt:9.3.6
          imagePullPolicy: IfNotPresent
          env:
            # k8s env vars do NOT do shell expansion; the compose.yaml
            # form `postgres://user:$(POSTGRES_PASSWORD)@host/...` does
            # not work in k8s. Use the actual secret value inline.
            # (In production, prefer a templated value or a config file.)
            - name: MGT_PG
              value: postgres://safeline-ce:tier3-pg-test-password-99@safeline-pg/safeline-ce?sslmode=disable
            - name: POSTGRES_PASSWORD
              value: tier3-pg-test-password-99
            # mgt must know where to fetch fvm bytecode. In compose, mgt
            # connects to the fvm container by its compose-network IP. In
            # k8s, the FVM Service DNS name is safeline-fvm. fvm listens
            # on 0.0.0.0:9004 internally, and the Service maps :80 ->
            # 9004 so mgt can hit http://safeline-fvm/skynetinfo.
            - name: MGT_FVM
              value: "http://safeline-fvm/skynetinfo"
          ports:
            - containerPort: 1443
              name: api
            - containerPort: 9002
              name: grpc
          readinessProbe:
            exec:
              command: ["sh", "-c", "wget -qO- --no-check-certificate https://localhost:1443/api/open/health || exit 1"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "wget -qO- --no-check-certificate https://localhost:1443/api/open/health || exit 1"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: nginx-logs
              mountPath: /app/log/nginx
            - name: sock
              mountPath: /app/sock
      volumes:
        - name: data
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
        - name: sock
          emptyDir: {}
