---
# Postgres 15.2 from chaitin (single tag, per registry).
# Replicas=1 because pg replication is out of scope for Tier 3.
apiVersion: v1
kind: Service
metadata:
  name: safeline-pg
  namespace: safeline-ce
spec:
  clusterIP: None
  selector:
    app: safeline-pg
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: safeline-pg
  namespace: safeline-ce
spec:
  serviceName: safeline-pg
  replicas: 1
  selector:
    matchLabels:
      app: safeline-pg
  template:
    metadata:
      labels:
        app: safeline-pg
    spec:
      initContainers:
        # OrbStack's local-path provisioner creates the hostPath with
        # root:root ownership and fsGroup-based chown in kubelet does
        # not apply. chown manually as root (privileged init container
        # is fine here — it only touches the data dir and exits).
        - name: fix-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - "chown -R 999:999 /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: chaitin/safeline-postgres:15.2
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: safeline-ce
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: safeline-pg-secret
                  key: password
            - name: POSTGRES_DB
              value: safeline-ce
          ports:
            - containerPort: 5432
              name: postgres
          # The image's entrypoint is docker-entrypoint.sh, which runs
          # initdb on an empty PGDATA. We must let it run, so we inherit
          # the image's Entrypoint + Cmd and pass the compose.yaml
          # `command: postgres -c max_connections=600` as args.
          args: ["-c", "max_connections=600"]
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "safeline-ce", "-d", "safeline-ce"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "safeline-ce", "-d", "safeline-ce"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
