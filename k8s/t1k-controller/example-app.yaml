# 一个最小化的"应用"，用来验证 WAF 是否真的生效。
# 真实使用时把 spec 换成你自己的应用即可，应用本体不需要任何改动。

apiVersion: v1
kind: Namespace
metadata:
  name: demo-app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-html
  namespace: demo-app
data:
  index.html: |
    <!doctype html>
    <title>demo</title>
    <h1>OK</h1>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
spec:
  replicas: 2
  selector: { matchLabels: { app: demo-app } }
  template:
    metadata: { labels: { app: demo-app } }
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports: [{ containerPort: 80 }]
        volumeMounts:
        - { name: html, mountPath: /usr/share/nginx/html }
        - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
        resources:
          requests: { cpu: 50m, memory: 32Mi }
      volumes:
      - name: html
        configMap: { name: demo-app-html }
      - name: conf
        configMap: { name: demo-app-nginx-conf }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-nginx-conf
  namespace: demo-app
data:
  default.conf: |
    server {
        listen 80;
        location / { root /usr/share/nginx/html; }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-app
spec:
  selector: { app: demo-app }
  ports: [{ port: 80, targetPort: 80 }]

---
# WAF 默认对所有 Ingress 生效（因为 controller 全局开了 plugins: "safeline"）。
# 想关掉单个 Ingress 的 WAF，加这个 annotation：
#   metadata:
#     annotations:
#       safeline.nginx.org/disable: "true"
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app
  namespace: demo-app
spec:
  ingressClassName: nginx
  rules:
  - host: demo.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-app
            port: { number: 80 }
